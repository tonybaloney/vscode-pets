<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!-- Engine stylesheets, served from /media. Loaded BEFORE our bundle so
             our Tailwind utilities (injected by Vite) win where they overlap. -->
        <link href="/media/reset.css" rel="stylesheet" />
        <link href="/media/pets.css" rel="stylesheet" />
        <style>
            @font-face {
                font-family: 'silkscreen';
                src: url('/media/Silkscreen-Regular.ttf') format('truetype');
            }
        </style>
        <title>Pet Park — pets that roam your screen</title>
    </head>
    <body>
        <!-- Header -->
        <header
            class="fixed top-4 left-4 z-[1000] flex items-center gap-3 rounded-2xl border border-line bg-surface/70 px-4 py-2.5 shadow-lg shadow-black/40 backdrop-blur"
        >
            <span
                class="grid h-9 w-9 place-items-center rounded-xl bg-brand/20 text-brand-soft"
            >
                <!-- Lucide: paw-print -->
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <circle cx="11" cy="4" r="2" />
                    <circle cx="18" cy="8" r="2" />
                    <circle cx="20" cy="16" r="2" />
                    <path
                        d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"
                    />
                </svg>
            </span>
            <div class="leading-tight">
                <h1 class="font-display text-lg font-bold text-ink">
                    Pet Park
                </h1>
                <p class="text-xs text-muted">Tiny pets roaming your screen</p>
            </div>
        </header>

        <!-- Floating control bar -->
        <div
            class="fixed top-5 left-1/2 z-[1000] flex -translate-x-1/2 flex-wrap items-center gap-2 rounded-2xl border border-line bg-surface/80 px-3 py-2.5 shadow-xl shadow-black/50 backdrop-blur"
        >
            <label class="sr-only" for="petType">Pet type</label>
            <select
                id="petType"
                aria-label="Pet type"
                class="ctrl-select"
            ></select>

            <label class="sr-only" for="petColor">Pet color</label>
            <select
                id="petColor"
                aria-label="Pet color"
                class="ctrl-select"
            ></select>

            <label class="sr-only" for="petSize">Pet size</label>
            <select
                id="petSize"
                aria-label="Pet size"
                class="ctrl-select"
            ></select>

            <label class="sr-only" for="petTheme">Background theme</label>
            <select
                id="petTheme"
                aria-label="Background theme"
                class="ctrl-select"
            ></select>

            <span class="mx-1 h-6 w-px bg-line"></span>

            <button id="spawn" class="btn btn-cta" type="button">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg>
                Add pet
            </button>
            <button id="throw" class="btn btn-ghost" type="button">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <circle cx="12" cy="12" r="9" />
                    <path d="M12 3a9 9 0 0 0 0 18" />
                    <path d="M3.6 9h16.8M3.6 15h16.8" />
                </svg>
                Throw ball
            </button>
            <button
                id="reset"
                class="btn btn-danger"
                type="button"
                aria-label="Remove all pets"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <path d="M3 6h18" />
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                </svg>
                Delete All
            </button>
        </div>

        <!-- Active-pet roster -->
        <aside
            class="fixed top-4 right-4 z-[1000] flex max-h-[70vh] w-60 flex-col rounded-2xl border border-line bg-surface/80 shadow-xl shadow-black/50 backdrop-blur"
        >
            <div class="flex items-center gap-2 px-4 pt-3 pb-2">
                <!-- Lucide: list -->
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="text-brand-soft"
                    aria-hidden="true"
                >
                    <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                </svg>
                <h2 class="font-display text-sm font-bold text-ink">
                    Active pets
                </h2>
                <span
                    id="rosterCount"
                    class="ml-auto rounded-md bg-brand/20 px-1.5 text-xs font-semibold text-brand-soft"
                    >0</span
                >
            </div>
            <div
                id="roster"
                class="flex flex-col gap-1.5 overflow-y-auto px-3 pb-3"
            ></div>
        </aside>

        <!-- DOM structure the engine expects (mirrors the VS Code webview). -->
        <div id="petCanvasContainer">
            <canvas id="ballCanvas"></canvas>
            <canvas id="foregroundEffectCanvas"></canvas>
            <canvas id="backgroundEffectCanvas"></canvas>
        </div>
        <div id="petsContainer"></div>
        <div id="foreground"></div>
        <div id="background"></div>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
